<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תיק חסכונות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=IBM+Plex+Mono:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #18120A;
      --parchment: #F2EBD9;
      --cream:     #FAF6EE;
      --red:       #9B2226;
      --rust:      #AE4A1B;
      --brown:     #7A5C3A;
      --rule:      #C9BFAA;
      --faint:     #E4DBCA;
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'Frank Ruhl Libre', serif;
      --display: 'Playfair Display', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--serif);
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
      direction: rtl;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── MASTHEAD ── */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 28px 48px 0;
      position: relative;
    }

    .masthead-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
    }

    .masthead-title-block { flex: 1; }

    .masthead-kicker {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brown);
      display: block;
      margin-bottom: 6px;
    }

    .masthead-title {
      font-family: var(--display);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .masthead-date {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--brown);
      letter-spacing: 0.08em;
    }

    /* Grand total block — offset to the left */
    .total-block {
      text-align: left;
      border-right: 1px solid var(--rule);
      padding-right: 36px;
      min-width: 240px;
    }

    .total-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brown);
      display: block;
      margin-bottom: 6px;
    }

    .total-amount {
      font-family: var(--mono);
      font-size: clamp(1.9rem, 4vw, 3rem);
      font-weight: 600;
      color: var(--red);
      direction: ltr;
      display: block;
      line-height: 1;
    }

    .total-change {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--brown);
      margin-top: 6px;
      direction: ltr;
      display: block;
    }

    /* Decorative rule row under masthead */
    .masthead-rule-row {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 18px;
    }

    .masthead-rule-row span {
      font-family: var(--display);
      font-style: italic;
      font-size: 0.8rem;
      color: var(--rust);
      white-space: nowrap;
      padding: 4px 14px 4px 0;
    }

    .rule-line {
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* ── ACCOUNTS LEDGER ── */
    .ledger {
      padding: 0 48px;
    }

    .ledger-header {
      display: grid;
      grid-template-columns: 1fr 160px 100px 180px;
      gap: 0;
      border-bottom: 2px solid var(--ink);
      padding: 14px 0 10px;
    }

    .ledger-header span {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brown);
    }

    .ledger-header span:not(:first-child) {
      text-align: left;
      direction: ltr;
    }

    /* Each account row */
    .account-row {
      border-bottom: 1px solid var(--rule);
      padding: 22px 0 18px;
      display: grid;
      grid-template-columns: 1fr 160px 100px 180px;
      gap: 0;
      align-items: start;
      position: relative;
      transition: background 0.15s;
    }

    .account-row:hover {
      background: rgba(155, 34, 38, 0.03);
    }

    /* Left edge accent bar — different for each account */
    .account-row::before {
      content: '';
      position: absolute;
      right: -48px;
      top: 0;
      bottom: 0;
      width: 4px;
    }

    .row-checking::before  { background: var(--rust); }
    .row-pension::before   { background: #4A7C59; }
    .row-money::before     { background: #B5860D; }
    .row-portfolio::before { background: #4A5E7C; }

    .account-name-col { padding-left: 8px; }

    .account-name {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 3px;
    }

    .account-desc {
      font-family: var(--serif);
      font-size: 0.78rem;
      color: var(--brown);
      font-weight: 300;
    }

    .account-updated {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--rule);
      margin-top: 6px;
      direction: ltr;
    }

    /* Amount column */
    .account-amount-col {
      direction: ltr;
      text-align: left;
      padding-top: 4px;
    }

    .account-amount {
      font-family: var(--mono);
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1;
      display: block;
    }

    .row-checking  .account-amount { color: var(--rust); }
    .row-pension   .account-amount { color: #4A7C59; }
    .row-money     .account-amount { color: #B5860D; }
    .row-portfolio .account-amount { color: #4A5E7C; }

    /* Pct column */
    .account-pct-col {
      direction: ltr;
      text-align: left;
      padding-top: 8px;
    }

    .pct-number {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--brown);
    }

    /* Progress bar — thin, horizontal ledger line style */
    .pct-bar-track {
      height: 3px;
      background: var(--faint);
      margin-top: 6px;
      position: relative;
      width: 80px;
    }

    .pct-bar-fill {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      transition: width 0.5s ease;
    }

    .row-checking  .pct-bar-fill { background: var(--rust); }
    .row-pension   .pct-bar-fill { background: #4A7C59; }
    .row-money     .pct-bar-fill { background: #B5860D; }
    .row-portfolio .pct-bar-fill { background: #4A5E7C; }

    /* Edit column */
    .account-edit-col {
      direction: ltr;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-top: 2px;
    }

    .edit-input {
      width: 108px;
      background: var(--cream);
      border: 1px solid var(--rule);
      border-bottom: 2px solid var(--ink);
      border-radius: 0;
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--ink);
      text-align: left;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .edit-input:focus {
      background: #fff;
      border-color: var(--red);
      border-bottom-color: var(--red);
    }

    .edit-input::placeholder { color: var(--rule); font-size: 0.75rem; }

    .save-btn {
      background: var(--ink);
      color: var(--parchment);
      border: none;
      border-radius: 0;
      padding: 7px 12px;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .save-btn:hover {
      background: var(--red);
      color: #fff;
    }

    /* ── HISTORY SECTION ── */
    .history-wrap {
      padding: 0 48px 60px;
    }

    .history-head {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin: 48px 0 18px;
      border-top: 3px double var(--ink);
      padding-top: 24px;
    }

    .history-head h2 {
      font-family: var(--display);
      font-style: italic;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--ink);
    }

    .history-head .h-rule { flex: 1; height: 1px; background: var(--rule); }

    .clear-btn {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--rule);
      color: var(--brown);
      padding: 5px 12px;
      border-radius: 0;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.82rem;
    }

    thead tr {
      border-bottom: 2px solid var(--ink);
    }

    th {
      padding: 0 0 10px;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brown);
      font-weight: 600;
      text-align: right;
    }

    th:last-child { text-align: left; direction: ltr; }

    td {
      padding: 9px 0;
      border-bottom: 1px solid var(--faint);
      color: var(--ink);
      text-align: right;
    }

    td:last-child { direction: ltr; text-align: left; color: var(--rust); }

    tbody tr:hover td { background: rgba(155,34,38,0.04); }

    .empty-row td {
      text-align: center;
      color: var(--rule);
      font-style: italic;
      font-family: var(--serif);
      font-size: 0.85rem;
      padding: 28px 0;
    }

    /* ── WATERMARK ── */
    .ledger-watermark {
      position: fixed;
      bottom: 40px;
      left: 48px;
      font-family: var(--display);
      font-style: italic;
      font-size: 0.72rem;
      color: var(--faint);
      pointer-events: none;
      user-select: none;
      letter-spacing: 0.06em;
    }

    /* ── SVG DECO ── */
    .deco-corner {
      position: absolute;
      top: 20px;
      left: 48px;
      opacity: 0.18;
      pointer-events: none;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .masthead, .ledger, .history-wrap { padding-left: 20px; padding-right: 20px; }

      .masthead-top { flex-direction: column; }
      .total-block { border-right: none; border-top: 1px solid var(--rule); padding-right: 0; padding-top: 18px; }

      .ledger-header,
      .account-row {
        grid-template-columns: 1fr 120px;
        grid-template-rows: auto auto;
      }

      .ledger-header span:nth-child(3),
      .ledger-header span:nth-child(4),
      .account-pct-col,
      .account-edit-col { display: none; }

      .account-row::before { right: -20px; }

      .deco-corner { display: none; }
    }

    /* ── LOAD ANIMATION ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .masthead        { animation: fadeUp 0.4s ease both; }
    .ledger          { animation: fadeUp 0.4s 0.1s ease both; }
    .history-wrap    { animation: fadeUp 0.4s 0.2s ease both; }
  </style>
</head>
<body>

<!-- SVG corner deco -->
<svg class="deco-corner" width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 80 L10 10 L80 10" stroke="#18120A" stroke-width="1.5" fill="none"/>
  <path d="M10 10 L30 30" stroke="#18120A" stroke-width="1.5"/>
  <circle cx="10" cy="10" r="3" fill="#9B2226"/>
  <circle cx="80" cy="10" r="2" fill="#18120A"/>
  <circle cx="10" cy="80" r="2" fill="#18120A"/>
</svg>

<!-- ── MASTHEAD ── -->
<header class="masthead">
  <div class="masthead-top">
    <div class="masthead-title-block">
      <span class="masthead-kicker">דו"ח פיננסי אישי</span>
      <h1 class="masthead-title">תיק חסכונות</h1>
      <span class="masthead-date" id="today-date"></span>
    </div>
    <div class="total-block">
      <span class="total-label">סה"כ נכסים</span>
      <span class="total-amount" id="grand-total">₪0</span>
      <span class="total-change" id="last-updated"></span>
    </div>
  </div>
  <div class="masthead-rule-row">
    <span>עדכן סכום ולחץ שמור</span>
    <div class="rule-line"></div>
  </div>
</header>

<!-- ── ACCOUNTS LEDGER ── -->
<section class="ledger">
  <div class="ledger-header">
    <span>חשבון</span>
    <span>יתרה</span>
    <span>%&nbsp;מהתיק</span>
    <span>עדכון</span>
  </div>
  <div id="ledger-rows"></div>
</section>

<!-- ── HISTORY ── -->
<section class="history-wrap">
  <div class="history-head">
    <h2>יומן פעולות</h2>
    <div class="h-rule"></div>
    <button class="clear-btn" onclick="clearHistory()">נקה יומן</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>תאריך ושעה</th>
        <th>חשבון</th>
        <th>יתרה מעודכנת</th>
      </tr>
    </thead>
    <tbody id="history-body"></tbody>
  </table>
</section>

<div class="ledger-watermark">Savings Ledger — personal record</div>

<script>
  const ACCOUNTS = [
    { id: 'checking',     label: 'עו"ש',       desc: 'חשבון עובר ושב',        cls: 'row-checking'  },
    { id: 'pension',      label: 'פנסיה',       desc: 'קרן פנסיה',             cls: 'row-pension'   },
    { id: 'money_market', label: 'קרן כספית',   desc: 'קרן כספית / נזילה',     cls: 'row-money'     },
    { id: 'portfolio',    label: 'תיק השקעות',  desc: 'מניות ואגרות חוב',      cls: 'row-portfolio' },
  ];

  function loadData()    { return JSON.parse(localStorage.getItem('savings_data')    || '{}'); }
  function saveData(d)   { localStorage.setItem('savings_data',    JSON.stringify(d)); }
  function loadHistory() { return JSON.parse(localStorage.getItem('savings_history') || '[]'); }
  function saveHistory(h){ localStorage.setItem('savings_history', JSON.stringify(h.slice(-100))); }

  function fmt(n) {
    return '₪' + Math.round(n).toLocaleString('he-IL');
  }

  function getTotal(data) {
    return ACCOUNTS.reduce((s, a) => s + (parseFloat(data[a.id]) || 0), 0);
  }

  function renderCards() {
    const data  = loadData();
    const total = getTotal(data);

    document.getElementById('grand-total').textContent = fmt(total);

    const today = new Date();
    document.getElementById('today-date').textContent =
      today.toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric' });

    const lastUpdates = ACCOUNTS.map(a => data[a.id + '_updated']).filter(Boolean).sort().reverse();
    document.getElementById('last-updated').textContent =
      lastUpdates[0] ? 'עדכון אחרון: ' + lastUpdates[0] : '';

    const container = document.getElementById('ledger-rows');
    container.innerHTML = '';

    ACCOUNTS.forEach(acc => {
      const value = parseFloat(data[acc.id]) || 0;
      const pct   = total > 0 ? (value / total * 100) : 0;
      const upd   = data[acc.id + '_updated'] || '';

      const row = document.createElement('div');
      row.className = `account-row ${acc.cls}`;
      row.innerHTML = `
        <div class="account-name-col">
          <div class="account-name">${acc.label}</div>
          <div class="account-desc">${acc.desc}</div>
          ${upd ? `<div class="account-updated">${upd}</div>` : ''}
        </div>

        <div class="account-amount-col">
          <span class="account-amount">${fmt(value)}</span>
        </div>

        <div class="account-pct-col">
          <span class="pct-number">${pct.toFixed(1)}%</span>
          <div class="pct-bar-track">
            <div class="pct-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>

        <div class="account-edit-col">
          <input
            class="edit-input"
            type="number"
            id="input-${acc.id}"
            placeholder="סכום חדש"
            value="${value || ''}"
            min="0"
            step="100"
          />
          <button class="save-btn" onclick="updateAccount('${acc.id}')">שמור</button>
        </div>
      `;
      container.appendChild(row);
    });
  }

  function updateAccount(id) {
    const input = document.getElementById('input-' + id);
    const val   = parseFloat(input.value);
    if (isNaN(val) || val < 0) { input.focus(); return; }

    const data = loadData();
    data[id] = val;
    const now = new Date().toLocaleString('he-IL');
    data[id + '_updated'] = now;
    saveData(data);

    const history = loadHistory();
    const acc = ACCOUNTS.find(a => a.id === id);
    history.unshift({ date: now, label: acc.label, amount: val });
    saveHistory(history);

    renderCards();
    renderHistory();
  }

  function renderHistory() {
    const history = loadHistory();
    const tbody   = document.getElementById('history-body');
    if (history.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="3">אין רשומות עדיין</td></tr>';
      return;
    }
    tbody.innerHTML = history.map(h => `
      <tr>
        <td>${h.date}</td>
        <td>${h.label}</td>
        <td>${fmt(h.amount)}</td>
      </tr>
    `).join('');
  }

  function clearHistory() {
    if (confirm('למחוק את כל יומן הפעולות?')) {
      localStorage.removeItem('savings_history');
      renderHistory();
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const el = document.activeElement;
      if (el && el.id.startsWith('input-')) {
        updateAccount(el.id.replace('input-', ''));
      }
    }
  });

  renderCards();
  renderHistory();
</script>
</body>
</html>
